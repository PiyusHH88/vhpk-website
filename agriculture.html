<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VHPK Agriculture</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/agriculture.css" />
</head>
<body class="agriculture">
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">VHPK Agriculture</div>
      <nav class="nav">
        <a href="agriculture.html">Home</a>
        <a href="#products">Products</a>
        <a href="#about">About Us</a>
        <a href="#gallery">Gallery</a>
        <a href="#shop">Shop</a>
        <a href="#contact">Contact Us</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="agri-hero">
      <div class="container">
        <h1>Fresh Mosambi &amp; Citrus Varieties</h1>
        <p>Hand-picked — Farm to table freshness.</p>
      </div>
    </section>

    <section id="products" class="container products agri-products">
      <h2>Our Citrus</h2>
      <div class="product-grid">
        <article class="product-card">
          <img src="https://via.placeholder.com/400x250?text=Mosambi" alt="Mosambi" />
          <h3>Mosambi</h3>
          <p>Juicy, sweet and fresh.</p>
          <div class="price-row"><strong>₹60 / kg</strong><button class="btn buy">Buy</button></div>
        </article>

        <article class="product-card">
          <img src="https://via.placeholder.com/400x250?text=Lemon" alt="Lemon" />
          <h3>Lemon</h3>
          <p>Zesty and tangy.</p>
          <div class="price-row"><strong>₹40 / kg</strong><button class="btn buy">Buy</button></div>
        </article>

        <article class="product-card">
          <img src="https://via.placeholder.com/400x250?text=Orange" alt="Orange" />
          <h3>Orange</h3>
          <p>Sweet citrus goodness.</p>
          <div class="price-row"><strong>₹80 / kg</strong><button class="btn buy">Buy</button></div>
        </article>
      </div>
    </section>

    <section id="gallery" class="container gallery">
      <h2>Gallery</h2>
      <div class="gallery-grid">
        <img src="https://via.placeholder.com/300x200?text=Farm+1" alt="Farm 1" />
        <img src="https://via.placeholder.com/300x200?text=Farm+2" alt="Farm 2" />
        <img src="https://via.placeholder.com/300x200?text=Fruit+Closeup" alt="Fruit" />
      </div>
    </section>

    <section id="contact" class="container contact">
      <h2>Contact Us</h2>
      <form id="agri-contact-form" class="contact-form">
        <label>Name<input type="text" name="name" required /></label>
        <label>Email<input type="email" name="email" required /></label>
        <label>Message<textarea name="message" rows="5" required></textarea></label>
        <button type="submit" class="btn">Send Message</button>
      </form>
    </section>

    <section id="shop" class="container shop">
