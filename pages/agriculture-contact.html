<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact VHPK Agriculture</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/agriculture.css">
</head>
<body class="agriculture">

<header>
  <div class="header-inner container">
    <div class="brand"><div class="logo">V</div>VHPK Agriculture</div>
    <button class="menu-btn" id="menuBtn">☰</button>
    <nav id="siteNav">
      <a href="agriculture-home.html">Home</a>
      <a href="agriculture-products.html">Products</a>
      <a href="agriculture-gallery.html">Gallery</a>
      <a href="agriculture-about.html">About</a>
      <a href="agriculture-contact.html">Contact</a>
    </nav>
  </div>
</header>

<main>
  <section class="contact container reveal-on-scroll">
    <h2>Contact Us</h2>
    <form class="contact-form">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
      <button type="submit" class="btn">Send Message</button>
    </form>
  </section>
</main>

<footer class="site-footer">
  <div class="container footer-inner">© <span id="year-agri"></span> VHPK Agriculture</div>
</footer>

<script src="../js/main.js"></script>
<script src="../js/agriculture.js"></script>
</body>
</html>
