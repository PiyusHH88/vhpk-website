<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VHPK Agriculture — Gallery</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ---------- Variables & Reset ---------- */
:root{
  --bg:#fbfdf6;
  --earth:#6b4c3b;
  --leaf-dark:#2e7d32;
  --leaf:#6fbf73;
  --accent:#f1c27d;
  --muted:#58615f;
  --glass:rgba(255,255,255,0.58);
  --glass-strong:rgba(255,255,255,0.78);
  --radius:16px;
  --container:1200px;
  --transition:.3s;
  --ani:cubic-bezier(.2,.9,.3,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Inter',system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;background:var(--bg);color:#213;}
img{display:block;max-width:100%;border-radius:12px;transition:transform var(--transition);}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;font-family:'Inter',system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;}

/* ---------- Container ---------- */
.container{width:94%;max-width:var(--container);margin:0 auto;}

/* ---------- Header / Navbar ---------- */
header{
  position:fixed;top:0;left:0;right:0;z-index:200;
  backdrop-filter: blur(10px) saturate(110%);
  background: linear-gradient(180deg, rgba(255,255,255,0.28), rgba(255,255,255,0.18));
  border-bottom:1px solid rgba(255,255,255,0.35);
  box-shadow:0 6px 24px rgba(12,30,12,0.05);
}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 0}
.brand{display:flex;align-items:center;gap:12px;font-weight:800;color:var(--leaf-dark);font-size:1.15rem}
.brand .logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--leaf),var(--leaf-dark));display:inline-grid;place-items:center;color:#fff;font-weight:800;box-shadow:0 8px 26px rgba(30,100,40,0.12)}
nav{display:flex;gap:16px;align-items:center}
nav a{padding:8px 12px;border-radius:10px;font-weight:600;color:var(--muted);position:relative;transition:all .22s var(--ani);}
nav a:hover, nav a.active{color:var(--leaf-dark);transform:translateY(-2px);}
.menu-btn{display:none;background:none;border:none;font-size:1.25rem;padding:6px 8px;border-radius:8px;}
@media(max-width:880px){
  .menu-btn{display:inline-block}
  nav{display:none;position:absolute;top:66px;left:10px;right:10px;background:var(--glass);padding:12px;border-radius:14px;flex-direction:column;box-shadow:0 18px 50px rgba(0,0,0,0.08)}
  nav.show{display:flex}
}

/* ---------- Hero ---------- */
.hero {
  height:60vh;
  background:linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('/images/gallery\ main.jpg') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:3rem;
  font-weight:bold;
  text-align:center;
  margin-top:72px;
  border-bottom-left-radius:50px;
  border-bottom-right-radius:50px;
}

/* ---------- Gallery ---------- */
.gallery {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:50px 20px;
  max-width:1400px;
  margin:0 auto;
}
.gallery-item {
  position:relative;
  overflow:hidden;
  border-radius:15px;
  cursor:pointer;
  transition: transform 0.3s, box-shadow 0.3s;
  flex: 1 1 300px;
  max-width:300px;
}
.gallery-item img {
  width:100%;
  display:block;
  border-radius:15px;
  transition: transform 0.5s ease;
}
.gallery-item:hover {
  transform: scale(1.05);
  box-shadow:0 12px 30px rgba(0,0,0,0.25);
}
.gallery-item:hover img {
  transform: scale(1.1);
}
.gallery-item .overlay {
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  background:rgba(0,0,0,0.4);
  color:#fff;
  font-weight:bold;
  text-align:center;
  font-size:1rem;
  opacity:0;
  transition: opacity 0.3s;
}
.gallery-item:hover .overlay {
  opacity:1;
}

/* ---------- Lightbox ---------- */
.lightbox {
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.4s;
  z-index:200;
}
.lightbox.active {
  opacity:1;
  pointer-events:auto;
}
.lightbox img {
  max-width:90%;
  max-height:85%;
  border-radius:15px;
  box-shadow:0 12px 40px rgba(0,0,0,0.5);
}
.lightbox span {
  position:absolute;
  top:30px;
  right:30px;
  font-size:2rem;
  color:#fff;
  cursor:pointer;
  font-weight:bold;
}

/* ---------- Responsive ---------- */
@media(max-width:880px){
  .gallery {flex-direction:column;align-items:center;}
}
</style>
</head>
<body>

<header>
  <div class="header-inner container">
    <div class="brand"><div class="logo">V</div>VHPK Agriculture</div>
    <button class="menu-btn" id="menuBtn" aria-label="Toggle menu">☰</button>
    <nav id="siteNav">
      <a href="agriculture-home.html">Home</a>
      <a href="agriculture-products.html">Products</a>
      <a href="agriculture-gallery.html" class="active">Gallery</a>
      <a href="agriculture-about.html">About</a>
      <a href="agriculture-contact.html">Contact</a>
    </nav>
  </div>
</header>

<!-- Hero -->
<div class="hero">Our Farm & Fruits</div>

<!-- Gallery -->
<section class="gallery">
  <div class="gallery-item"><img src="/images/image7.jpg" alt="Mosambi 1"><div class="overlay"></div></div>
  <div class="gallery-item"><img src="/images/image8.jpg" alt="Mosambi 2"><div class="overlay"></div></div>
  <div class="gallery-item"><img src="/images/image10.jpg" alt="Mosambi 1"><div class="overlay"></div></div>
  <div class="gallery-item"><img src="/images/image11.jpg" alt="Mosambi 2"><div class="overlay"></div></div>
  <div class="gallery-item"><img src="/images/image12.jpg" alt="Mosambi 3"><div class="overlay"></div></div>
  <div class="gallery-item"><img src="/images/image13.jpg" alt="Farm Landscape"><div class="overlay"></div></div>
  <div class="gallery-item"><img src="/images/image14.jpg" alt="Harvest"><div class="overlay"></div></div>
  <div class="gallery-item"><img src="/images/image15.jpg" alt="Fresh Fruits"><div class="overlay"></div></div>
</section>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <span id="close">&times;</span>
  <img src="" alt="Zoomed Image" id="lightbox-img">
</div>

<script>
// Navbar menu toggle
const menuBtn = document.getElementById('menuBtn'),
      siteNav = document.getElementById('siteNav');
menuBtn.addEventListener('click', () => siteNav.classList.toggle('show'));

// Lightbox
const galleryItems = document.querySelectorAll('.gallery-item img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const closeBtn = document.getElementById('close');

galleryItems.forEach(item => {
  item.addEventListener('click', () => {
    lightbox.classList.add('active');
    lightboxImg.src = item.src;
  });
});
closeBtn.addEventListener('click', () => lightbox.classList.remove('active'));
lightbox.addEventListener('click', (e) => { if(e.target !== lightboxImg) lightbox.classList.remove('active'); });
</script>

</body>
</html>
