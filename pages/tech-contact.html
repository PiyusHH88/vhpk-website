<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | VHPK TECH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
</head>
<body>

    <nav class="navbar">
        <div class="container nav-container">
            <a href="tech-home.html" class="logo">VHPK <span>TECH</span></a>
            <ul class="nav-links">
                <li><a href="tech-home.html" class="nav-link">Home</a></li>
                <li><a href="tech-services.html" class="nav-link">Services</a></li>
                <li><a href="tech-about.html" class="nav-link">About</a></li>
                <li><a href="tech-contact.html" class="nav-link active">Contact</a></li>
                <li><a href="tech-contact.html" class="btn btn-primary" style="padding: 8px 20px;">Get Started</a></li>
            </ul>
            <div class="mobile-toggle"><i class="fas fa-bars"></i></div>
        </div>
    </nav>

    <header class="hero text-center">
        <div class="hero-bg-glow"></div>
        <div class="container">
            <h1 class="reveal">Get in <span class="text-gradient">Touch</span></h1>
            <p class="hero-sub reveal delay-100">Ready to start your project? Fill out the form below.</p>
        </div>
    </header>

    <section class="section-padding">
        <div class="container" style="max-width: 700px;">
            <div class="card reveal delay-200">
                <form action="#">
                    <div class="form-group">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Company (Optional)</label>
                        <input type="text" class="form-control" placeholder="Your Company Ltd">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Message</label>
                        <textarea class="form-control" rows="5" placeholder="Tell us about your project..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="copyright">&copy; 2026 VHPK TECH. All rights reserved.</div>
        </div>
    </footer>

    <script src="../main.js"></script>
</body>
</html>
