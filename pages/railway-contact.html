<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact VHPK Railway</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/railway.css">
</head>
<body class="railway">

<header class="site-header">
  <div class="container header-inner">
    <div class="brand">VHPK Railway</div>
    <nav class="nav">
      <a href="railway-home.html">Home</a>
      <a href="railway-products.html">Products</a>
      <a href="railway-about.html">About Us</a>
      <a href="railway-contact.html">Contact</a>
    </nav>
  </div>
</header>

<main>
  <section class="contact container reveal-on-scroll">
    <h2>Contact Us</h2>
    <form class="contact-form">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
      <button type="submit" class="btn">Send Message</button>
    </form>
  </section>
</main>

<footer class="site-footer">
  <div class="container footer-inner">© <span id="year-rail"></span> VHPK Railway</div>
</footer>

<script src="../js/main.js"></script>
<script src="../js/railway.js"></script>
</body>
</html>
